# =========================================================================
# Nginx Reverse Proxy Configuration
# Project: Fleet Manager API Gateway
# Target Environment: Production
# =========================================================================

# Rate limiting: 10 requests/sec per unique binary IP address with a 10MB state zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # Security: Suppress Nginx version disclosure in error headers
    server_tokens off;

    # Global ingress routing rule
    location / {
        # DDoS and Brute-Force mitigation via burst-buffer execution
        limit_req zone=api_limit burst=5 nodelay;

        # Internal container routing via Docker DNS service abstraction
        proxy_pass http://fleet-api:8080;

        # Reverse proxy protocol optimization (HTTP/1.1 persistent connections)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Downstream client telemetry forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
