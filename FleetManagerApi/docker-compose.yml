# =========================================================================
# Multi-Container Application Orchestration
# Project: Fleet Manager Infrastructure Stack
# Target Environment: Local Production Mirror
# =========================================================================

services:

  # -----------------------------------------------------------------------
  # Data Persistence Layer
  # -----------------------------------------------------------------------
  fleet-db:
    image: postgres:15-alpine
    container_name: fleet-postgres-db
    environment:
      POSTGRES_DB: FleetDb
      POSTGRES_USER: fleet_admin
      POSTGRES_PASSWORD: YourSecurePasswordHere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Application Core Layer (.NET Runtime)
  # -----------------------------------------------------------------------
  fleet-api:
    image: fleetmanagerapi:latest
    container_name: fleet-minimal-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=fleet-db;Database=FleetDb;Username=fleet_admin;Password=YourSecurePasswordHere
    depends_on:
      - fleet-db
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Ingress / Reverse Proxy Layer
  # -----------------------------------------------------------------------
  fleet-gateway:
    image: nginx:alpine
    container_name: fleet-nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fleet-api
    restart: unless-stopped

# -------------------------------------------------------------------------
# Volume Definitions
# -------------------------------------------------------------------------
volumes:
  postgres_data:

