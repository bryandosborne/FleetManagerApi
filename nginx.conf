events { 
    worker_connections 1024; 
}

http {
    # Security: Hide Nginx version numbers from error pages to prevent target scanning
    server_tokens off;

    # Define a rate limit zone to protect against brute-force attacks (10 requests per second)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost; # Change this to your server's IP address or domain name later

        # Forward all traffic matching /api straight to your .NET container
        location / {
            # Apply our security rate limit to incoming web traffic
            limit_req == zone=api_limit burst=5 nodelay;

            # CRITICAL: Route traffic to the Docker container using its Compose service name!
            proxy_pass http://fleet-minimal-api:8080;

            # Forward standard HTTP protocol headers so .NET knows where the request originated
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Forward the original user's physical IP address for logging/telematics
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
